name: PR Check (KMP)

on:
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  android-common-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: wrapper

      - name: Check for TODOs
        run: |
          if grep -r "TODO" ./composeApp/src; then
            echo "Found pending TODOs! Clean them up before merging."
            exit 1
          fi

      - name: Run Lint & Formatting
        run: ./gradlew lint

      - name: Run Common & Android Unit Tests
        run: ./gradlew :composeApp:testDebugUnitTest

  ios-check:
    needs: android-common-check
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Run iOS Tests
        run: ./gradlew :composeApp:iosSimulatorArm64Test

      - name: Build iOS Framework
        run: ./gradlew :composeApp:assembleReleaseX64