<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Join DN App</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-container": "#eeeeee",
                        "secondary-container": "#4c96fe",
                        "outline": "#8c706f",
                        "background": "#f9f9f9",
                        "on-primary": "#ffffff",
                        "secondary": "#005db8",
                        "primary-container": "#ff6b6b",
                        "surface": "#f9f9f9",
                        "on-surface-variant": "#584140",
                        "primary": "#ae2f34",
                        "surface-container-lowest": "#ffffff",
                        "surface-container-low": "#f3f3f3",
                        "on-surface": "#1a1c1c",
                        "outline-variant": "#e0bfbd",
                    },
                    "borderRadius": {
                        "DEFAULT": "1rem",
                        "lg": "2rem",
                        "xl": "3rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["Plus Jakarta Sans"],
                        "body": ["Plus Jakarta Sans"],
                        "label": ["Plus Jakarta Sans"]
                    }
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #f9f9f9;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .glass-effect {
            backdrop-filter: blur(20px);
            background: rgba(255, 255, 255, 0.8);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="text-on-surface antialiased overflow-x-hidden">
<div class="min-h-screen flex flex-col md:flex-row">
<div class="hidden md:flex md:w-1/2 relative bg-surface-container overflow-hidden">
<div class="absolute inset-0 z-0">
<img class="w-full h-full object-cover" data-alt="Soft ethereal sunlight streaming through large windows into a modern minimal architectural space with warm wood accents and peaceful atmosphere" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCxXgGspb7tXTySyXppDFy5VLliKLemz4eI-DLatALSIB7AugtO02xZ-v0eJ3BQ_OTPAuBgjNQkyJ28IEHrWdaW5Rk9hAhANRhVM2j6bwDKLSxylJmSL12pqgQNaBX8nM4YgHnfEKglsNs9F8I7tz2MuvR_ZHvdqKzqZGouPceHpzOWMm5tKfsFgmoSbfww6-IaBHeuKbZ4Vh61OtRwJCHUdxGOA4nx7-eEYa5fFXI7uo6oB6pvSuwXtV7ZFvdWy0F8T7nBiU8yOA"/>
<div class="absolute inset-0 bg-gradient-to-br from-primary/20 to-secondary/10 mix-blend-multiply"></div>
</div>
<div class="relative z-10 p-16 flex flex-col justify-end w-full">
<div class="p-12 glass-effect rounded-xl">
<h1 class="text-5xl font-extrabold tracking-tighter text-primary mb-6">DN App</h1>
<p class="text-xl text-on-surface-variant leading-relaxed max-w-md">
                        Find your rhythm. Discover your purpose. Welcome to a modern community where faith meets intentionality.
                    </p>
</div>
</div>
</div>
<div class="flex-1 flex flex-col items-center justify-center p-6 md:p-12 lg:p-24 bg-surface">
<div class="w-full max-w-md space-y-10">
<header class="space-y-3">
<div class="flex items-center space-x-2 text-primary font-bold tracking-tighter text-2xl md:hidden mb-8">
<span>DN App</span>
</div>
<h2 class="text-4xl font-extrabold tracking-tight text-on-surface">Create Account</h2>
<p class="text-on-surface-variant font-medium">Join our vibrant collective and start your journey.</p>
</header>
<form class="space-y-6">
<div class="space-y-5">
<div class="relative group">
<label class="block text-sm font-semibold text-on-surface-variant mb-1.5 ml-1 uppercase tracking-widest">Full Name</label>
<input class="w-full px-6 py-4 bg-surface-container-low border border-transparent focus:border-secondary-container focus:ring-0 rounded-[20px] transition-all duration-300 placeholder:text-stone-400" placeholder="Enter your full name" type="text"/>
</div>
<div class="relative group">
<label class="block text-sm font-semibold text-on-surface-variant mb-1.5 ml-1 uppercase tracking-widest">Email Address</label>
<input class="w-full px-6 py-4 bg-surface-container-low border border-transparent focus:border-secondary-container focus:ring-0 rounded-[20px] transition-all duration-300 placeholder:text-stone-400" placeholder="hello@dnapp.com" type="email"/>
</div>
<div class="grid grid-cols-1 md:grid-cols-2 gap-4">
<div class="relative group">
<label class="block text-sm font-semibold text-on-surface-variant mb-1.5 ml-1 uppercase tracking-widest">City</label>
<input class="w-full px-6 py-4 bg-surface-container-low border border-transparent focus:border-secondary-container focus:ring-0 rounded-[20px] transition-all duration-300 placeholder:text-stone-400" placeholder="Your City" type="text"/>
</div>
<div class="relative group">
<label class="block text-sm font-semibold text-on-surface-variant mb-1.5 ml-1 uppercase tracking-widest">Postcode</label>
<input class="w-full px-6 py-4 bg-surface-container-low border border-transparent focus:border-secondary-container focus:ring-0 rounded-[20px] transition-all duration-300 placeholder:text-stone-400" placeholder="Postcode" type="text"/>
</div>
</div>
<div class="relative group">
<label class="block text-sm font-semibold text-on-surface-variant mb-1.5 ml-1 uppercase tracking-widest">Phone Number</label>
<input class="w-full px-6 py-4 bg-surface-container-low border border-transparent focus:border-secondary-container focus:ring-0 rounded-[20px] transition-all duration-300 placeholder:text-stone-400" placeholder="+1 (555) 000-0000" type="tel"/>
</div>
<div class="relative group">
<label class="block text-sm font-semibold text-on-surface-variant mb-1.5 ml-1 uppercase tracking-widest">Password</label>
<input class="w-full px-6 py-4 bg-surface-container-low border border-transparent focus:border-secondary-container focus:ring-0 rounded-[20px] transition-all duration-300 placeholder:text-stone-400" placeholder="Create a strong password" type="password"/>
</div>
</div>
<div class="pt-4">
<button class="w-full py-5 bg-primary-container text-on-primary-container font-bold text-lg rounded-full hover:scale-[1.02] active:scale-[0.98] transition-all duration-200 shadow-xl shadow-primary-container/20" type="submit">
                            Register
                        </button>
</div>
</form>
<div class="text-center pt-4">
<p class="text-on-surface-variant font-medium">
                        Already have an account? 
                        <a class="text-primary font-bold hover:underline ml-1" href="#">Login</a>
</p>
</div>
<div class="pt-8 flex items-center justify-center space-x-8 opacity-40 grayscale">
<span class="material-symbols-outlined text-4xl">favorite</span>
<span class="material-symbols-outlined text-4xl">volunteer_activism</span>
<span class="material-symbols-outlined text-4xl">diversity_3</span>
</div>
</div>
</div>
</div>
<div class="fixed bottom-8 left-1/2 -translate-x-1/2 z-50 pointer-events-none md:pointer-events-auto">
<div class="flex items-center space-x-2 px-6 py-3 glass-effect rounded-full shadow-lg border border-white/20">
<span class="w-2 h-2 bg-primary-container rounded-full animate-pulse"></span>
<span class="text-xs font-bold uppercase tracking-widest text-on-surface-variant">Registration Open for 2024</span>
</div>
</div>
</body></html>
